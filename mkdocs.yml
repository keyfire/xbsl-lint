# Конфигурация сайта документации (GitHub Pages, деплой из .github/workflows/docs.yml).
# docs_dir не менялся – остаётся дефолтный docs/, где уже лежат англо/русские пары
# страниц (Имя.md + Имя.ru.md); сборка проверяется локально: mkdocs build --strict.
site_name: XBSL (1C:Element)
site_description: >-
  A linter with autofixes, an LSP server, documentation search and metadata scaffolding
  for 1C:Element (XBSL) sources, plus a VS Code extension built on the same engine.
site_url: https://keyfire.github.io/xbsl/
repo_url: https://github.com/keyfire/xbsl
repo_name: keyfire/xbsl
edit_uri: edit/main/docs/
docs_dir: docs

copyright: MIT License – see NOTICE for trademark and data provenance notes.

theme:
  name: material
  language: en
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.top
    - navigation.footer
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit

nav:
  - Home: index.md
  - Guide: GUIDE.md
  - Rules: RULES.md
  - Visual designer: DESIGNER.md
  - VS Code extension: https://github.com/keyfire/xbsl/blob/main/editors/vscode/README.md
  - Contributing: https://github.com/keyfire/xbsl/blob/main/CONTRIBUTING.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
      # Юникод-slugify – якоря заголовков читаются и для кириллических страниц (ru);
      # дефолтный slugify обрежет не-ASCII и разойдётся с ручными #якорями в оглавлении
      # GUIDE.ru.md.
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true

# Страницы существуют парами Имя.md (английский, по умолчанию) + Имя.ru.md (русский) –
# ровно та раскладка файлов, которую суффиксный режим i18n-плагина ожидает "из коробки":
# nav ссылается только на английские имена файлов, ru-вариант плагин находит сам по
# суффиксу и собирает под /ru/. Пары без ru-файла (index.md) остаются доступны только
# на английском – fallback_to_default (по умолчанию true) ничего в этом случае не ломает.
plugins:
  - search
  - i18n:
      docs_structure: suffix
      languages:
        - locale: en
          name: English
          build: true
          default: true
        - locale: ru
          name: Русский
          build: true
